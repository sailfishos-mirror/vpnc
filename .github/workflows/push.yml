---
name: push

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  discussions: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  super-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: ln -sv .github/linters/commitlint.config.mjs ./
      - uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ !contains(github.event_name, 'pull_request') }}
          VALIDATE_JSCPD: false
          # cpplint conflicts with project's tab-indent C style; clang-format is canonical
          VALIDATE_CPP: false
          # pcf2vpnc is vendored upstream perl
          FILTER_REGEX_EXCLUDE: .*src/pcf2vpnc$
          SAVE_SUPER_LINTER_OUTPUT: false
          MULTI_STATUS: false
          LOG_LEVEL: WARN
  test:
    needs: [super-linter]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: |
          sudo apt update
          sudo apt install -y libgcrypt20-dev libgnutls28-dev
          make test
  notify:
    needs: [test]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: dispatch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2
          persist-credentials: false
      # resolve parent SHA so force pushes don't break paths-filter
      - id: parent
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          base: ${{ steps.parent.outputs.sha }}
          filters: |
            docs:
              - 'docs/**'
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        if: steps.filter.outputs.docs == 'true'
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_STREAMBINDER }}
          repository: streambinder/streambinder
          event-type: doc-sync
          client-payload: '{"repo": "${{ github.repository }}", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
